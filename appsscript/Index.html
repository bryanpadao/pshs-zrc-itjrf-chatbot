<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSHS ZRC IT Support Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 480px;
      height: 90vh;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #1a3c6e;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #fff;
    }

    .chat-header .info h2 { font-size: 16px; }
    .chat-header .info p  { font-size: 12px; opacity: 0.8; }

    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.bot {
      background: #e8edf5;
      color: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      background: #1a3c6e;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .chat-input {
      display: flex;
      padding: 12px 16px;
      border-top: 1px solid #e0e0e0;
      gap: 8px;
      background: #fff;
    }

    .chat-input textarea {
      flex: 1;
      resize: none;
      border: 1px solid #ccc;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      max-height: 100px;
      overflow-y: auto;
    }

    .chat-input textarea:focus { border-color: #1a3c6e; }

    .chat-input button {
      background: #1a3c6e;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .chat-input button:hover  { background: #255090; }
    .chat-input button:active { background: #0f2550; }

    .chat-input.locked textarea {
      background: #f5f5f5;
      color: #aaa;
      cursor: not-allowed;
    }

    .chat-input.locked button {
      background: #ccc;
      cursor: not-allowed;
      pointer-events: none;
    }

    .new-chat-bar {
      padding: 12px 16px;
      border-top: 1px solid #e0e0e0;
      background: #fff;
      text-align: center;
      display: none;
    }

    .new-chat-bar button {
      background: #1a3c6e;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 10px 28px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }

    .new-chat-bar button:hover { background: #255090; }

    .typing {
      display: flex;
      gap: 4px;
      padding: 10px 14px;
      background: #e8edf5;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      width: fit-content;
    }
    .typing span {
      width: 8px; height: 8px;
      background: #888;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="info">
        <h2>PSHS ZRC IT Support</h2>
        <p>IT Job Request Form Chatbot</p>
      </div>
    </div>

    <div class="chat-messages" id="messages"></div>

    <div class="chat-input" id="chat-input">
      <textarea id="input" placeholder="Type a message..." rows="1"></textarea>
      <button id="sendBtn">&#9658;</button>
    </div>

    <div class="new-chat-bar" id="new-chat-bar">
      <button onclick="location.reload()">&#8635; Start a New Conversation</button>
    </div>
  </div>

  <script>
    const messagesEl  = document.getElementById('messages');
    const inputEl     = document.getElementById('input');
    const sendBtn     = document.getElementById('sendBtn');
    const chatInputEl = document.getElementById('chat-input');
    const newChatBar  = document.getElementById('new-chat-bar');

    let session = {};

    function lockChat() {
      chatInputEl.classList.add('locked');
      inputEl.disabled = true;
      inputEl.placeholder = 'Conversation ended.';
      chatInputEl.style.display = 'none';
      newChatBar.style.display = 'block';
    }

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = 'message ' + type;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing-indicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      inputEl.value = '';
      inputEl.style.height = 'auto';
      showTyping();

      google.script.run
        .withSuccessHandler(function(response) {
          hideTyping();
          session = response.session;
          if (response.replies && response.replies.length > 1) {
            response.replies.forEach(function(r) { if (r) addMessage(r, 'bot'); });
          } else {
            addMessage(response.reply, 'bot');
          }
          if (response.submitted) lockChat();
        })
        .withFailureHandler(function(err) {
          hideTyping();
          addMessage('Sorry, something went wrong. Please try again.', 'bot');
          console.error(err);
        })
        .processChat({ message: text, session: session });
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    // Greeting on load
    window.addEventListener('load', function() {
      addMessage('Hello! I\'m the PSHS ZRC IT Support Chatbot. I can help you troubleshoot issues or submit an IT Job Request Form. How can I help you today?', 'bot');
    });
  </script>
</body>
</html>
