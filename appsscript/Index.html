<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Prevent iOS from auto-linking phone numbers, addresses, dates in chat bubbles -->
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no, url=no">
  <title>PSHS-ZRC IT Unit Help Desk</title>
  <link rel="icon" type="image/png" href="https://drive.google.com/thumbnail?id=14RNRQVTqVzwLduk-In17y7n_SQ6BGUXz&sz=w64">
  <!-- Apply saved theme before first paint to prevent flash of wrong theme (DESIGN.md §7-C) -->
  <script>
    (function() {
      if (localStorage.getItem('pshs_theme') === 'light') {
        document.documentElement.classList.add('light-mode');
      }
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    /* ── Design-system variables (DESIGN.md) ────────────────────────────────── */
    :root {
      --bg-base:    #0f1923;
      --bg-card:    #18232f;
      --bg-panel:   #1e2d3d;
      --bg-input:   #243447;
      --bg-hover:   #243040;
      --navy:       #1a3c6e;
      --navy-mid:   #1e4a8a;
      --navy-light: #2a5faa;
      --gold:       #c9a84c;
      --green:      #1D9E75;
      --red:        #e24b4a;
      --amber:      #d4860f;
      --purple:     #7c5cbc;
      --border:     rgba(255,255,255,0.07);
      --border-mid: rgba(255,255,255,0.12);
      --text-pri:   #e8edf2;
      --text-sec:   #8ba3bc;
      --text-muted: #5a7490;
      --radius-lg:  14px;
      --radius-md:  10px;
      --radius-sm:  7px;
      /* CCTV warning text — changes between modes */
      --cctv-title: #e8a030;
      --cctv-check: #c8912a;
    }

    /* ── Light mode overrides (DESIGN.md §7-A) ──────────────────────────────── */

    html.light-mode {
      --bg-base:    #f0f4f8;
      --bg-card:    #ffffff;
      --bg-panel:   #e8edf3;
      --bg-input:   #f5f7fa;
      --bg-hover:   #e0e7ef;
      --border:     rgba(0,0,0,0.08);
      --border-mid: rgba(0,0,0,0.14);
      --text-pri:   #1a2b3c;
      --text-sec:   #3d5a73;
      --text-muted: #7a9ab0;
    }

    /* Surfaces hardcoded to #131e2a must be explicitly overridden */
    html.light-mode .sidebar,
    html.light-mode .my-tickets-panel-header { background: #dde5ef; }

    /* CCTV warning text is darker in light mode for contrast */
    html.light-mode {
      --cctv-title: #7a4800;
      --cctv-check: #6b3d00;
    }

    /* Fix the online-dot border colour (it hardcodes the sidebar bg) */
    html.light-mode .id-bar-avatar::after { border-color: #dde5ef; }

    /* ── Theme toggle button (DESIGN.md §7-B) ────────────────────────────────── */

    .btn-theme-toggle {
      background: transparent;
      border: 1px solid var(--border-mid);
      border-radius: 6px;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; cursor: pointer;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }

    .btn-theme-toggle:hover { border-color: var(--gold); }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-base);
      background-image: url('https://drive.google.com/thumbnail?id=1rSPTtHpvS4kw_9AAOGDQk_FnnLpa7SXC&sz=w1920');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100%;
      padding: 24px;
    }

    /* ── Shell — two-column card ─────────────────────────────────────────────── */

    .shell {
      display: flex;
      width: 100%;
      max-width: 1160px;
      height: calc(100vh - 48px);
      min-height: 600px;
      background: var(--bg-card);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px var(--border);
    }

    /* ── Sidebar ──────────────────────────────────────────────────────────────── */

    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: #131e2a;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 0 16px;
      overflow: hidden;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo-img { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
    .logo-name { font-size: 14px; font-weight: 700; color: var(--text-pri); }
    .logo-sub  { font-size: 9px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; margin-top: 1px; }

    /* Section label above ticket list */
    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 16px 16px 8px;
      flex-shrink: 0;
    }

    /* ── Sidebar ticket list ──────────────────────────────────────────────────── */

    #ticket-strip {
      display: none;   /* shown via JS when user has tickets */
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    #ticket-strip-items {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px;
    }

    .sidebar-ticket-item {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .sidebar-ticket-item:hover { border-color: var(--border-mid); }

    .sidebar-ticket-id {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sidebar-ticket-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-pending  { background: var(--amber); }
    .dot-progress { background: #3b82f6; box-shadow: 0 0 5px #3b82f6; }
    .dot-done     { background: var(--green); }
    .dot-rejected { background: var(--red); }

    .sidebar-ticket-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-pri);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-ticket-status { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

    .ticket-strip-toggle {
      font-size: 11px;
      color: var(--navy-light);
      cursor: pointer;
      display: block;
      background: none;
      border: none;
      padding: 6px 10px 10px;
      font-family: 'Inter', sans-serif;
      text-align: center;
      width: 100%;
      transition: color 0.15s;
    }

    .ticket-strip-toggle:hover { color: var(--text-pri); }

    /* ── Sidebar user card (bottom) ───────────────────────────────────────────── */

    .sidebar-bottom { padding: 0 12px; flex-shrink: 0; }

    #identity-bar {
      display: none;   /* becomes flex after identity resolves */
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 13px;
      align-items: center;
      gap: 10px;
    }

    .id-bar-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--navy);
      border: 2px solid var(--navy-light);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
    }

    /* Green online dot on avatar */
    .id-bar-avatar::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--green);
      border: 2px solid #131e2a;
    }

    .id-bar-info { flex: 1; min-width: 0; }

    .id-bar-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-pri);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .id-bar-sub {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    /* Plain green "✓ Verified" text — no background pill */
    .id-bar-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Main panel ───────────────────────────────────────────────────────────── */

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
      position: relative;
    }

    /* ── Loading state ─────────────────────────────────────────────────────────── */

    #loading-state {
      display: flex;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: var(--bg-card);
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid var(--border-mid);
      border-top-color: var(--navy-light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 13px; color: var(--text-muted); }

    /* ── Main content — service grid + chat ──────────────────────────────────── */

    #main-content {
      display: none;   /* becomes flex after identity resolves */
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Service card grid ────────────────────────────────────────────────────── */

    .qs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 20px 20px 0;
      flex-shrink: 0;
    }

    .qs-btn {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 14px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      font-family: 'Inter', sans-serif;
    }

    .qs-btn:hover  { border-color: var(--border-mid); background: var(--bg-hover); }
    .qs-btn.active { background: rgba(26,60,110,0.25); border-color: var(--navy-light); border-width: 1.5px; }

    .qs-icon-wrap {
      width: 40px; height: 40px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
      font-size: 20px;
    }

    .qs-btn[data-type="it_issue"]    .qs-icon-wrap { background: rgba(26,60,110,0.5);  border: 1px solid rgba(42,95,170,0.4); }
    .qs-btn[data-type="publication"] .qs-icon-wrap { background: rgba(20,80,60,0.5);   border: 1px solid rgba(29,158,117,0.3); }
    .qs-btn[data-type="cctv"]        .qs-icon-wrap { background: rgba(120,70,10,0.5);  border: 1px solid rgba(212,134,15,0.3); }
    .qs-btn[data-type="technical"]   .qs-icon-wrap { background: rgba(80,50,130,0.5);  border: 1px solid rgba(120,80,200,0.3); }

    .qs-label { font-size: 12px; font-weight: 600; color: var(--text-pri); line-height: 1.3; }
    .qs-sub   { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

    /* ── Direct-submit shortcut ───────────────────────────────────────────────── */

    #direct-submit-bar {
      display: none;
      padding: 10px 20px 0;
      flex-shrink: 0;
    }

    #direct-submit-bar button {
      background: transparent;
      border: 1px solid var(--border-mid);
      border-radius: 40px;
      padding: 8px 18px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sec);
      letter-spacing: 0.4px;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    #direct-submit-bar button:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Chat separator ───────────────────────────────────────────────────────── */

    .chat-area-sep {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px 0;
      flex-shrink: 0;
    }

    .chat-area-sep span {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
      white-space: nowrap;
    }

    .chat-area-sep::before,
    .chat-area-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Messages area ────────────────────────────────────────────────────────── */

    .chat-messages {
      flex: 1;
      padding: 12px 20px 8px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.bot-row { align-self: flex-start; max-width: 86%; }

    .bot-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--navy);
      border: 1px solid var(--navy-light);
      color: #fff;
      font-size: 8px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .message {
      padding: 11px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: normal;
      font-family: 'Inter', sans-serif;
    }

    .message.bot {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-top-left-radius: 3px;
      color: var(--text-pri);
    }

    .message.bot a, .message.bot * {
      color: var(--text-pri) !important;
      text-decoration: none !important;
      pointer-events: none;
    }

    .message.user {
      background: var(--navy);
      border: 1px solid var(--navy-light);
      border-top-right-radius: 3px;
      color: #fff;
      align-self: flex-end;
      max-width: 78%;
    }

    .message.user a { color: #fff; text-decoration: none; pointer-events: none; }

    /* ── Typing indicator ─────────────────────────────────────────────────────── */

    .typing-row { display: flex; align-items: flex-end; gap: 8px; align-self: flex-start; }

    .typing {
      display: flex; gap: 5px;
      padding: 12px 14px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      border-top-left-radius: 3px;
      width: fit-content;
    }

    .typing span {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typingPulse 1.2s ease-in-out infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingPulse {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
      30%           { opacity: 1;   transform: scale(1); }
    }

    /* ── Chat input bar ───────────────────────────────────────────────────────── */

    #chat-input {
      display: none;   /* shown only when IT Issue is active */
      align-items: center;
      gap: 10px;
      background: var(--bg-input);
      border: 1px solid var(--border-mid);
      border-radius: 14px;
      padding: 10px 14px;
      margin: 8px 20px max(16px, env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    #chat-input textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 13px;
      color: var(--text-pri);
      font-family: 'Inter', sans-serif;
      resize: none;
      line-height: 1.5;
      min-height: 20px;
      max-height: 120px;
      overflow-y: hidden;
    }

    #chat-input textarea::placeholder { color: var(--text-muted); }
    #chat-input textarea:focus { outline: none; }

    #chat-input button {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--navy-light);
      border: none;
      color: #fff;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.15s;
      font-family: 'Inter', sans-serif;
    }

    #chat-input button:hover { background: var(--navy-mid); }
    #chat-input.locked textarea { color: var(--text-muted); cursor: not-allowed; }
    #chat-input.locked button   { background: var(--bg-panel); cursor: not-allowed; pointer-events: none; }

    /* ── New chat bar ─────────────────────────────────────────────────────────── */

    .new-chat-bar {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px 20px max(20px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .new-chat-bar button {
      width: 100%;
      max-width: 320px;
      background: var(--navy);
      border: 1px solid var(--navy-light);
      border-radius: var(--radius-sm);
      padding: 10px 28px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }

    .new-chat-bar button:hover { background: var(--navy-mid); }

    .new-chat-bar button.secondary {
      background: transparent;
      color: var(--text-sec);
      border-color: var(--border-mid);
    }

    .new-chat-bar button.secondary:hover { color: var(--text-pri); }

    /* ── Form panel ───────────────────────────────────────────────────────────── */

    #form-panel {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      flex-direction: column;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
    }

    .mini-form {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .mini-form-title    { font-size: 16px; font-weight: 600; color: var(--text-pri); }
    .mini-form-subtitle { font-size: 13px; color: var(--text-sec); margin-top: 2px; }

    .form-identity-row {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-id-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--navy);
      border: 1px solid var(--navy-light);
      color: #fff;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .form-id-text { flex: 1; min-width: 0; }
    .form-id-name { font-size: 12px; font-weight: 500; color: var(--text-pri); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .form-id-sub  { font-size: 10px; color: var(--text-muted); margin-top: 1px; line-height: 1.4; }

    /* "✓ Verified" pill inside form identity strip */
    .form-id-lock {
      margin-left: auto;
      font-size: 10px;
      color: var(--green);
      background: rgba(29,158,117,0.12);
      border: 1px solid rgba(29,158,117,0.25);
      border-radius: 20px;
      padding: 3px 10px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .cctv-warning {
      background: rgba(212,134,15,0.08);
      border: 1px solid rgba(212,134,15,0.35);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
    }

    .cctv-warning-title { font-size: 12px; font-weight: 600; color: var(--cctv-title); margin-bottom: 5px; }
    .cctv-warning-body  { font-size: 12px; color: var(--text-sec); line-height: 1.5; }

    .cctv-checkbox-label {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      margin-top: 10px;
      font-size: 11px;
      color: var(--cctv-check);
      cursor: pointer;
      line-height: 1.5;
    }

    .cctv-checkbox-label input[type="checkbox"] {
      margin-top: 2px;
      flex-shrink: 0;
      accent-color: var(--amber);
      width: 14px; height: 14px;
      cursor: pointer;
    }

    .form-field-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      display: block;
    }

    .form-textarea {
      width: 100%;
      resize: none;
      background: var(--bg-input);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      color: var(--text-pri);
      outline: none;
      min-height: 110px;
      transition: border-color 0.15s;
    }

    .form-textarea:focus { border-color: var(--navy-light); }
    .form-textarea::placeholder { color: var(--text-muted); }

    .word-count              { font-size: 10px; margin-top: 4px; text-align: right; }
    .word-count.sufficient   { color: var(--green); }
    .word-count.insufficient { color: var(--red); }

    /* Form action row — back + submit side by side */
    .form-actions { display: flex; gap: 10px; align-items: center; }

    .form-submit-btn {
      flex: 1;
      background: var(--navy);
      border: 1px solid var(--navy-light);
      border-radius: var(--radius-sm);
      padding: 10px 20px;
      font-size: 13px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      display: flex; align-items: center; justify-content: center;
    }

    .form-submit-btn:hover:not(:disabled) { background: var(--navy-mid); }
    .form-submit-btn:disabled { background: var(--bg-panel); border-color: var(--border); color: var(--text-muted); cursor: not-allowed; }
    .form-submit-btn.loading  { opacity: 0.7; cursor: not-allowed; pointer-events: none; }

    .form-back-link {
      background: transparent;
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-size: 12px;
      color: var(--text-sec);
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: color 0.15s;
      white-space: nowrap;
    }

    .form-back-link:hover { color: var(--text-pri); }

    .form-error {
      background: rgba(226,75,74,0.1);
      border: 1px solid rgba(226,75,74,0.3);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      font-size: 12px;
      color: #f07070;
      display: none;
      line-height: 1.5;
    }

    /* ── My Tickets overlay panel ─────────────────────────────────────────────── */

    .my-tickets-panel {
      position: absolute;
      inset: 0;
      background: var(--bg-card);
      z-index: 10;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .my-tickets-panel-header {
      background: #131e2a;
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px; font-weight: 600;
      color: var(--text-pri);
      flex-shrink: 0;
    }

    .my-tickets-panel-header button {
      background: transparent;
      border: 1px solid var(--border-mid);
      color: var(--text-sec);
      padding: 5px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      transition: color 0.15s;
    }

    .my-tickets-panel-header button:hover { color: var(--text-pri); }

    .my-tickets-list { flex: 1; overflow-y: auto; padding: 16px 20px; }

    .ticket-item {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .ticket-item:hover { border-color: var(--border-mid); }
    .ticket-item .ti-jrf     { font-size: 10px; color: var(--text-muted); font-weight: 500; margin-bottom: 4px; }
    .ticket-item .ti-problem { font-size: 13px; font-weight: 500; color: var(--text-pri); margin: 4px 0 6px; line-height: 1.4; }
    .ticket-item .ti-status  { font-size: 11px; color: var(--text-sec); }

    .ticket-detail {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .ticket-detail p { font-size: 13px; line-height: 1.6; color: var(--text-sec); }

    .ticket-detail .back-btn {
      font-size: 12px;
      color: var(--navy-light);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0 0 8px;
      font-family: 'Inter', sans-serif;
      display: block;
    }

    /* ── Mobile ────────────────────────────────────────────────────────────────── */

    @media (max-width: 768px) {
      body { padding: 0; align-items: stretch; }
      .shell { border-radius: 0; height: 100vh; margin: 0; max-width: none; }
      .sidebar { display: none; }
      .main { width: 100%; }
      #chat-input textarea { font-size: 16px; }   /* prevent iOS zoom */
      .qs-grid { padding: 14px 14px 0; gap: 8px; }
      .chat-messages { padding: 10px 14px 8px; }
      #chat-input { margin: 8px 14px max(14px, env(safe-area-inset-bottom)); }
      .new-chat-bar { padding: 12px 14px max(20px, env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
  <div class="shell">

    <!-- ── Sidebar ────────────────────────────────────────────────────────────── -->
    <aside class="sidebar">

      <!-- Logo block -->
      <div class="sidebar-logo">
        <img class="logo-img" src="https://drive.google.com/thumbnail?id=14RNRQVTqVzwLduk-In17y7n_SQ6BGUXz&sz=w200" alt="PSHS ZRC Logo">
        <div>
          <div class="logo-name">IT Unit Help Desk</div>
          <div class="logo-sub">PSHS-ZRC</div>
        </div>
      </div>

      <!-- MY TICKETS strip — label + items shown together; hidden until user has tickets -->
      <div id="ticket-strip">
        <div class="sidebar-section-label">My Tickets</div>
        <div id="ticket-strip-items"></div>
      </div>

      <!-- Spacer pushes user card to bottom -->
      <div style="flex:1;"></div>

      <!-- User card — shown after identity resolves -->
      <div class="sidebar-bottom">
        <!-- Theme toggle sits above the user card -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <button class="btn-theme-toggle" id="theme-toggle" title="Toggle light/dark mode">
            <span id="theme-icon">☀️</span>
          </button>
          <span id="theme-label" style="font-size:11px;color:var(--text-muted);cursor:pointer;user-select:none;" onclick="document.getElementById('theme-toggle').click()">Dark mode</span>
        </div>
        <div id="identity-bar">
          <div class="id-bar-avatar" id="id-bar-avatar">?</div>
          <div class="id-bar-info">
            <div class="id-bar-name" id="id-bar-name">Loading…</div>
            <div class="id-bar-sub"  id="id-bar-sub"></div>
          </div>
          <div class="id-bar-badge">✓ Verified</div>
        </div>
      </div>

    </aside><!-- /.sidebar -->

    <!-- ── Main panel ─────────────────────────────────────────────────────────── -->
    <div class="main">

      <!-- Loading spinner — visible by default while getUserIdentity() runs -->
      <div id="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">Verifying your identity…</div>
      </div>

      <!-- Main content — hidden until identity resolves -->
      <div id="main-content">

        <!-- 2×2 quick-start service cards -->
        <div class="qs-grid" id="qs-grid">
          <button class="qs-btn" data-type="it_issue" onclick="handleQsClick(this)">
            <div class="qs-icon-wrap">💻</div>
            <span class="qs-label">IT Issue / Repair</span>
            <span class="qs-sub">Troubleshoot with AI</span>
          </button>
          <button class="qs-btn" data-type="publication" onclick="handleQsClick(this)">
            <div class="qs-icon-wrap">🎨</div>
            <span class="qs-label">Publication / Design</span>
            <span class="qs-sub">Pubmat, tarpaulin, etc.</span>
          </button>
          <button class="qs-btn" data-type="cctv" onclick="handleQsClick(this)">
            <div class="qs-icon-wrap">📷</div>
            <span class="qs-label">CCTV Request</span>
            <span class="qs-sub">Requires Director letter</span>
          </button>
          <button class="qs-btn" data-type="technical" onclick="handleQsClick(this)">
            <div class="qs-icon-wrap">🔧</div>
            <span class="qs-label">Technical Assistance</span>
            <span class="qs-sub">Setup, installation, etc.</span>
          </button>
        </div>

        <!-- Visual separator between quick-start area and chat -->
        <div class="chat-area-sep"><span>chat</span></div>

        <!-- Direct-submit shortcut — shown when IT Issue flow is active -->
        <div id="direct-submit-bar">
          <button onclick="showFormPanel('it_issue')">📝 Skip troubleshooting — submit ticket directly</button>
        </div>

        <!-- Chat message bubbles -->
        <div class="chat-messages" id="messages"></div>

        <!-- Form panel — shown instead of messages for publication/cctv/technical flows -->
        <div id="form-panel"></div>

      </div><!-- /#main-content -->

      <!-- Chat input bar — hidden by default; shown only when IT Issue is active -->
      <div id="chat-input">
        <textarea id="input" placeholder="Message" rows="1" disabled></textarea>
        <button id="sendBtn">&#9650;</button>
      </div>

      <!-- "Start a New Conversation" bar — shown after chat locks -->
      <div class="new-chat-bar" id="new-chat-bar">
        <button onclick="resetChat()">&#8635; Start a New Conversation</button>
        <button class="secondary" id="view-tickets-btn" onclick="openMyTickets()" style="display:none;">&#128203; View My Tickets</button>
      </div>

    </div><!-- /.main -->

  </div><!-- /.shell -->

  <script>
    const messagesEl   = document.getElementById('messages');
    const inputEl      = document.getElementById('input');
    const sendBtn      = document.getElementById('sendBtn');
    const chatInputEl  = document.getElementById('chat-input');
    const newChatBar   = document.getElementById('new-chat-bar');
    const mainContent  = document.getElementById('main-content');
    const loadingState = document.getElementById('loading-state');
    const identityBar  = document.getElementById('identity-bar');

    let sessionId       = ''; // server-side session key
    let currentUser     = null; // identity from getUserIdentity() — set on load
    let currentFormType = null; // 'publication' | 'cctv' | 'technical' | 'it_issue' — set when form is open
    let currentChatKey  = null; // 'it_issue' | 'question' — tracks active chat flow to prevent duplicate intros
    let savedChatKey    = null; // saved chat key while a form panel is open (restored on hideFormPanel)

    // Per-type config for the inline form panel
    const FORM_CONFIG = {
      it_issue: {
        icon:        '💻',
        title:       'IT Issue / Repair',
        subtitle:    'Describe the problem and we\'ll file a ticket for you.',
        placeholder: 'e.g. My computer won\'t turn on. I\'ve already checked the power cable and tried a different outlet.',
      },
      publication: {
        icon:        '🎨',
        title:       'Publication / Design Request',
        subtitle:    'Describe what you need — the IT unit handles all publication and design work for PSHS ZRC.',
        placeholder: 'e.g. Tarpaulin design for Women\'s Month celebration, March 28, size 4×8ft, PSHS theme, deadline March 25',
      },
      cctv: {
        icon:        '📷',
        title:       'CCTV Viewing Request',
        subtitle:    'Complete the form below.',
        placeholder: 'e.g. Purpose of the CCTV request — incident investigation near the library entrance on March 1, 2026 between 2:00–3:00 PM',
      },
      technical: {
        icon:        '🔧',
        title:       'Technical Assistance Request',
        subtitle:    'Describe what you need help with.',
        placeholder: 'e.g. My laptop won\'t connect to the projector in Room 201. I\'ve already tried restarting both devices.',
      },
    };

    /* Locks the chat input and shows the "Start a New Conversation" bar */
    function lockChat() {
      chatInputEl.classList.add('locked');
      inputEl.disabled = true;
      inputEl.placeholder = 'Conversation ended.';
      chatInputEl.style.display = 'none';
      newChatBar.style.display = 'flex';
      // Show "View My Tickets" only when we have an identified user to query
      const viewBtn = document.getElementById('view-tickets-btn');
      if (viewBtn && currentUser && currentUser.email) {
        viewBtn.style.display = 'block';
      }
      // Refresh the MY TICKETS strip so the newly submitted ticket appears
      refreshTicketStrip();
    }

    /* Returns initials from a full name (first + last character) */
    function getInitials(name) {
      if (!name) return '?';
      const parts = name.trim().split(/\s+/);
      if (parts.length === 1) return parts[0][0].toUpperCase();
      return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    }

    /* Returns the CSS pill class for a given ticket status string */
    function statusPillClass(status) {
      if (!status) return 'status-pending';
      if (status.includes('Completed')) return 'status-done';
      if (status.includes('Rejected'))  return 'status-rejected';
      if (status.includes('Progress'))  return 'status-progress';
      return 'status-pending';
    }

    /* Adds a message bubble to the chat.
       Bot messages starting with a numbered list (e.g. "1.") are rendered as .kb-card
       to visually distinguish troubleshooting steps from normal chat replies. */
    function addMessage(text, type) {
      if (type === 'bot') {
        const isKbCard = /^\d+[\.\)]\s/.test((text || '').trimStart());
        if (isKbCard) {
          const card = document.createElement('div');
          card.className = 'kb-card';
          card.textContent = text;
          messagesEl.appendChild(card);
        } else {
          const row = document.createElement('div');
          row.className = 'msg-row bot-row';

          const avatar = document.createElement('div');
          avatar.className = 'bot-avatar';
          avatar.textContent = 'IT';

          const bubble = document.createElement('div');
          bubble.className = 'message bot';
          bubble.textContent = text;

          row.appendChild(avatar);
          row.appendChild(bubble);
          messagesEl.appendChild(row);
        }
      } else {
        // User bubbles: appended directly (no wrapper) so max-width: 84% is relative to full chat width
        const bubble = document.createElement('div');
        bubble.className = 'message user';
        bubble.textContent = text;
        messagesEl.appendChild(bubble);
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    /* Shows the three-dot typing indicator with a mini bot avatar */
    function showTyping() {
      const row = document.createElement('div');
      row.className = 'typing-row';
      row.id = 'typing-indicator';

      const avatar = document.createElement('div');
      avatar.className = 'bot-avatar';
      avatar.textContent = 'IT';

      const dots = document.createElement('div');
      dots.className = 'typing';
      dots.innerHTML = '<span></span><span></span><span></span>';

      row.appendChild(avatar);
      row.appendChild(dots);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      inputEl.value = '';
      inputEl.style.height = 'auto';
      showTyping();

      // Pass userIdentity on every message so server can pre-fill session on first use
      const chatParams = { message: text, sessionId: sessionId };
      if (currentUser) chatParams.userIdentity = currentUser;

      google.script.run
        .withSuccessHandler(function(response) {
          hideTyping();
          sessionId = response.sessionId || sessionId;
          if (response.replies && response.replies.length > 1) {
            response.replies.forEach(function(r) { if (r) addMessage(r, 'bot'); });
          } else {
            addMessage(response.reply, 'bot');
          }
          if (response.submitted) lockChat();
        })
        .withFailureHandler(function(err) {
          hideTyping();
          addMessage('Sorry, something went wrong. Please try again.', 'bot');
          console.error(err);
        })
        .processChat(chatParams);
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener('input', function() {
      this.style.height = 'auto';
      const newH = Math.min(this.scrollHeight, 120);
      this.style.height = newH + 'px';
      // Only show scrollbar when content exceeds max-height
      this.style.overflowY = this.scrollHeight > 120 ? 'auto' : 'hidden';
    });

    /* showQuickReplies is a no-op — the 2×2 grid in #main-content is always visible */
    function showQuickReplies() { /* no-op */ }

    /* Handles click on a 2×2 grid button. */
    function handleQsClick(btn) {
      document.querySelectorAll('.qs-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      const type = btn.getAttribute('data-type');
      handleQuickReply(type);
    }

    /* Routes the user to either the chat flow (it_issue) or the inline form panel.
       Chat messages are NEVER wiped when switching — the intro is only added once
       per session (when the messages area is empty). Form panels are shown/hidden
       without touching the message history. */
    function handleQuickReply(key) {
      if (key === 'it_issue' || key === 'question') {
        // Restore chat view (in case a form panel was open)
        document.getElementById('form-panel').style.display = 'none';
        messagesEl.style.display = '';
        enableInput();

        currentChatKey = key;
        const dsBar = document.getElementById('direct-submit-bar');

        // Show intro only if the chat is empty (first click in this session)
        if (messagesEl.children.length === 0) {
          var firstName = (currentUser && currentUser.name) ? currentUser.name.trim().split(/\s+/)[0] : '';
          if (key === 'it_issue') {
            addMessage('Hello' + (firstName ? ', ' + firstName : '') + '! Please describe the IT issue you\'re experiencing and I\'ll help troubleshoot.', 'bot');
          } else {
            addMessage('Hello' + (firstName ? ', ' + firstName : '') + '! What would you like to know?', 'bot');
          }
        }
        if (dsBar) dsBar.style.display = key === 'it_issue' ? 'block' : 'none';
      } else {
        // Form flow — show the mini-form card panel
        currentChatKey = null;
        document.getElementById('direct-submit-bar').style.display = 'none';
        showFormPanel(key);
      }
    }

    /* Resets the chat to the initial state (called by "Start a New Conversation") */
    function resetChat() {
      sessionId       = '';
      currentFormType = null;
      currentChatKey  = null;
      savedChatKey    = null;
      // Clear grid active states
      document.querySelectorAll('.qs-btn').forEach(function(b) { b.classList.remove('active'); });
      // Clear messages
      messagesEl.innerHTML = '';
      messagesEl.style.display = '';
      // Reset input bar — hidden until user clicks IT Issue again
      chatInputEl.classList.remove('locked');
      chatInputEl.style.display = 'none';
      inputEl.disabled = true;
      inputEl.placeholder = 'Message';
      // Hide form panel and direct-submit bar
      document.getElementById('form-panel').style.display = 'none';
      document.getElementById('direct-submit-bar').style.display = 'none';
      newChatBar.style.display = 'none';
      // Hide the "View My Tickets" button until the next lock
      const viewBtn = document.getElementById('view-tickets-btn');
      if (viewBtn) viewBtn.style.display = 'none';
    }

    function enableInput() {
      chatInputEl.style.display = 'flex';
      chatInputEl.classList.remove('locked');
      inputEl.disabled = false;
      inputEl.placeholder = 'Message';
    }

    // ── Identity resolution ─────────────────────────────────────────────────────

    function initChat() {
      // Loading state is already visible in HTML — just call the server
      google.script.run
        .withSuccessHandler(onIdentityResolved)
        .withFailureHandler(function() { onIdentityResolved({ error: 'not_signed_in' }); })
        .getUserIdentity();
    }

    function onIdentityResolved(identity) {
      // Hide loading spinner regardless of outcome
      loadingState.style.display = 'none';

      if (identity.error === 'not_signed_in') {
        showFullScreenMessage(
          'Please sign in with your PSHS ZRC Google account to use this chatbot.',
          'Sign in with Google',
          function() { location.reload(); }
        );
        return;
      }

      if (identity.error === 'wrong_domain') {
        showFullScreenMessage(
          'This chatbot is only for PSHS ZRC staff. Please sign in with your @' + identity.domain + ' school account.',
          'Sign in with a different account',
          function() { window.open('https://accounts.google.com/signout'); setTimeout(function(){ location.reload(); }, 1000); }
        );
        return;
      }

      if (identity.error === 'not_in_employees') {
        showFullScreenMessage(
          'Access denied. Your account (' + (identity.email || '') + ') is not registered in the PSHS ZRC employee records. ' +
          'Contact the IT unit to have your record added.',
          'Sign in with a different account',
          function() { window.open('https://accounts.google.com/signout'); setTimeout(function(){ location.reload(); }, 1000); }
        );
        return;
      }

      // Success — populate identity bar and show main content
      currentUser = identity;
      const initials = getInitials(identity.name);
      document.getElementById('id-bar-avatar').textContent = initials;
      document.getElementById('id-bar-name').textContent   = identity.name || '';
      document.getElementById('id-bar-sub').textContent    =
        [identity.position, identity.department].filter(Boolean).join(' · ');
      identityBar.style.display  = 'flex';
      mainContent.style.display  = 'flex';

      // Input stays hidden until the user clicks IT Issue / Repair

      // Fetch all user tickets to populate the MY TICKETS strip
      google.script.run
        .withSuccessHandler(onMyTicketsLoaded)
        .withFailureHandler(function() { /* strip stays hidden on error */ })
        .getMyTickets(identity.email);
    }

    /* Shows a full-screen error/auth message that replaces the container contents */
    function showFullScreenMessage(message, buttonText, buttonAction) {
      const container = document.querySelector('.main');
      container.innerHTML = '';
      const div = document.createElement('div');
      div.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px;text-align:center;gap:16px;';
      const p = document.createElement('p');
      p.style.cssText = 'font-size:15px;color:var(--text-sec);line-height:1.5;max-width:320px;';
      p.textContent = message;
      const btn = document.createElement('button');
      btn.textContent = buttonText;
      btn.style.cssText = 'padding:12px 24px;background:var(--navy);color:#fff;border:1px solid var(--navy-light);border-radius:var(--radius-sm);font-size:14px;cursor:pointer;font-family:inherit;';
      btn.onclick = buttonAction;
      div.appendChild(p);
      div.appendChild(btn);
      container.appendChild(div);
    }

    /* Returns the sidebar dot CSS class for a given ticket status */
    function statusDotClass(status) {
      if (!status) return 'dot-pending';
      if (status.includes('Completed')) return 'dot-done';
      if (status.includes('Rejected'))  return 'dot-rejected';
      if (status.includes('Progress'))  return 'dot-progress';
      return 'dot-pending';
    }

    /* Returns a short human-readable label for a ticket status */
    function statusShortLabel(status) {
      if (!status) return 'Pending';
      if (status.includes('Completed'))              return 'Completed';
      if (status.includes('Rejected'))               return 'Rejected';
      if (status === 'In Progress')                  return 'In Progress';
      if (status.includes('Supervisor Approval'))    return 'Awaiting supervisor';
      if (status.includes('IT Assessment'))          return 'Awaiting IT assessment';
      if (status.includes('Director Approval'))      return 'Awaiting director';
      return status;
    }

    /* Renders the MY TICKETS sidebar strip.
       Called on page load (via getMyTickets) and after a ticket is submitted. */
    function onMyTicketsLoaded(tickets) {
      if (!tickets || tickets.length === 0) return;

      const stripItems = document.getElementById('ticket-strip-items');
      stripItems.innerHTML = ''; // clear any previous content

      // Show up to 3 tickets in the sidebar; the rest are accessible via the overlay panel
      const visible = tickets.slice(0, 3);
      visible.forEach(function(t) {
        const item = document.createElement('div');
        item.className = 'sidebar-ticket-item';
        item.onclick   = function() { openMyTickets(); };

        const problem = t.problem.length > 40 ? t.problem.substring(0, 40) + '…' : t.problem;
        item.innerHTML =
          '<div class="sidebar-ticket-id">' +
            '<span class="sidebar-ticket-dot ' + statusDotClass(t.status) + '"></span>' +
            '#' + escHtml(t.jrfNo) +
          '</div>' +
          '<div class="sidebar-ticket-title">' + escHtml(problem) + '</div>' +
          '<div class="sidebar-ticket-status">' + escHtml(statusShortLabel(t.status)) + '</div>';
        stripItems.appendChild(item);
      });

      // Show "View all N tickets" link when there are more than 3
      if (tickets.length > 3) {
        const more = document.createElement('button');
        more.className   = 'ticket-strip-toggle';
        more.textContent = 'View all ' + tickets.length + ' tickets →';
        more.onclick     = openMyTickets;
        stripItems.appendChild(more);
      }

      document.getElementById('ticket-strip').style.display = 'flex';
    }

    /* Refreshes the MY TICKETS strip — called after a ticket is submitted. */
    function refreshTicketStrip() {
      if (!currentUser || !currentUser.email) return;
      google.script.run
        .withSuccessHandler(onMyTicketsLoaded)
        .withFailureHandler(function() {})
        .getMyTickets(currentUser.email);
    }

    // ── My Tickets overlay panel ─────────────────────────────────────────────────

    function openMyTickets() {
      google.script.run
        .withSuccessHandler(renderMyTicketsPanel)
        .withFailureHandler(function(err) { alert('Could not load tickets: ' + (err && err.message ? err.message : err)); })
        .getMyTickets(currentUser.email);
    }

    function renderMyTicketsPanel(tickets) {
      const container = document.querySelector('.main');
      const existing  = document.getElementById('my-tickets-panel');
      if (existing) existing.remove();

      const panel = document.createElement('div');
      panel.className = 'my-tickets-panel';
      panel.id        = 'my-tickets-panel';

      const header = document.createElement('div');
      header.className = 'my-tickets-panel-header';
      const headerTitle = document.createElement('span');
      headerTitle.textContent = '📋 My IT Tickets';
      header.appendChild(headerTitle);
      const backBtn = document.createElement('button');
      backBtn.textContent = '← Back';
      backBtn.onclick = function() { panel.remove(); };
      header.appendChild(backBtn);
      panel.appendChild(header);

      const list = document.createElement('div');
      list.className = 'my-tickets-list';
      list.id        = 'my-tickets-list';

      if (!tickets || tickets.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:#888;padding:32px;font-size:14px;">No tickets found.</p>';
      } else {
        tickets.forEach(function(t) {
          const item = document.createElement('div');
          item.className = 'ticket-item';
          const problem = t.problem.length > 60 ? t.problem.substring(0, 60) + '…' : t.problem;
          item.innerHTML =
            '<div class="ti-jrf">IT JRF #' + escHtml(t.jrfNo) + ' &nbsp;·&nbsp; ' + escHtml(t.date) + '</div>' +
            '<div class="ti-problem">' + escHtml(problem) + '</div>' +
            '<div class="ti-status">' + escHtml(t.status) + '</div>';
          item.onclick = function() { showTicketDetail(list, t, tickets); };
          list.appendChild(item);
        });
      }

      panel.appendChild(list);
      container.appendChild(panel);
    }

    function showTicketDetail(list, t, allTickets) {
      list.innerHTML = '';
      const detail = document.createElement('div');
      detail.className = 'ticket-detail';

      const backBtn = document.createElement('button');
      backBtn.className   = 'back-btn';
      backBtn.textContent = '← Back to list';
      backBtn.onclick = function() { renderMyTicketsPanel(allTickets); };
      detail.appendChild(backBtn);

      const fields = [
        ['IT JRF #:',   t.jrfNo],
        ['Date:',    t.date],
        ['Status:',  t.status],
        ['Problem:', t.problem],
      ];
      if (t.assignedStaff) fields.push(['Assigned to:', t.assignedStaff]);
      if (t.targetDate)    fields.push(['Target date:', t.targetDate]);
      if (t.dateCompleted) fields.push(['Completed:',   t.dateCompleted]);

      fields.forEach(function(f) {
        const p = document.createElement('p');
        p.innerHTML = '<strong>' + escHtml(f[0]) + '</strong> ' + escHtml(f[1]);
        detail.appendChild(p);
      });

      list.appendChild(detail);
    }

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Form Panel (Publication / CCTV / Technical) ──────────────────────────────

    /* Builds and shows the inline mini-form card for the given request type.
       Hides the chat message area and input bar while the form is visible. */
    function showFormPanel(type) {
      currentFormType  = type;
      const cfg        = FORM_CONFIG[type];
      const formPanel  = document.getElementById('form-panel');

      const initials = currentUser ? getInitials(currentUser.name) : '?';
      const idName   = currentUser ? (currentUser.name || '') : 'Unknown';
      const idSub    = currentUser
        ? [currentUser.position, currentUser.departmentFull || currentUser.department].filter(Boolean).join(' · ')
        : '';

      // CCTV-only: Data Privacy Act warning card with confirmation checkbox
      const cctvHtml = type === 'cctv'
        ? '<div class="cctv-warning">' +
            '<div class="cctv-warning-title">⚠️ Data Privacy Act requirement</div>' +
            '<div class="cctv-warning-body">You must have a formal letter addressed to the Campus Director containing the ' +
            'exact date, time range, camera location, and reason. The Director must approve before IT can proceed.</div>' +
            '<label class="cctv-checkbox-label">' +
              '<input type="checkbox" id="cctv-letter-checkbox" onchange="updateFormSubmitState()">' +
              '<span>I confirm I have a Campus Director-approved letter for this CCTV request.</span>' +
            '</label>' +
          '</div>'
        : '';

      formPanel.innerHTML =
        '<div class="mini-form">' +
          '<div>' +
            '<div class="mini-form-title">' + cfg.icon + ' ' + escHtml(cfg.title) + '</div>' +
            '<div class="mini-form-subtitle">' + escHtml(cfg.subtitle) + '</div>' +
          '</div>' +
          '<div class="form-identity-row">' +
            '<div class="form-id-avatar">' + escHtml(initials) + '</div>' +
            '<div class="form-id-text">' +
              '<div class="form-id-name">' + escHtml(idName) + '</div>' +
              '<div class="form-id-sub">'  + escHtml(idSub)  + '</div>' +
            '</div>' +
            '<span class="form-id-lock">✓ Verified</span>' +
          '</div>' +
          cctvHtml +
          '<div>' +
            '<label class="form-field-label">Description <span style="color:#c00">*</span></label>' +
            '<textarea class="form-textarea" id="form-description" placeholder="' + escHtml(cfg.placeholder) + '" oninput="updateWordCount()"></textarea>' +
            '<div class="word-count insufficient" id="word-count-display">0 words — please add more detail (minimum 8)</div>' +
          '</div>' +
          '<div class="form-error" id="form-error"></div>' +
          '<div class="form-actions">' +
            '<button class="form-back-link" onclick="hideFormPanel()">← Back</button>' +
            '<button class="form-submit-btn" id="form-submit-btn" onclick="submitFormRequest()" disabled>Submit Request →</button>' +
          '</div>' +
        '</div>';

      // Save the current chat key so hideFormPanel can restore it without re-showing the intro
      savedChatKey   = currentChatKey;
      currentChatKey = null;

      // Hide chat view and input bar while form is active
      messagesEl.style.display                                   = 'none';
      chatInputEl.style.display                                  = 'none';
      document.getElementById('direct-submit-bar').style.display = 'none';
      formPanel.style.display                                    = 'flex';
    }

    /* Hides the form panel and restores the chat view.
       Does NOT change the message history or active button state — the user is just
       navigating back to the chat without switching to a different flow. */
    function hideFormPanel() {
      document.getElementById('form-panel').style.display = 'none';
      messagesEl.style.display = '';
      currentFormType = null;
      // Restore the chat key that was active before the form opened
      currentChatKey = savedChatKey;
      savedChatKey   = null;
      // Only show the input bar when returning to IT Issue chat
      const dsBar = document.getElementById('direct-submit-bar');
      if (currentChatKey === 'it_issue') {
        chatInputEl.style.display = 'flex';
        if (dsBar) dsBar.style.display = 'block';
        const itBtn = document.querySelector('.qs-btn[data-type="it_issue"]');
        if (itBtn) itBtn.classList.add('active');
      } else {
        chatInputEl.style.display = 'none';
        if (dsBar) dsBar.style.display = 'none';
      }
    }

    /* Updates the word count display and enables/disables the submit button */
    function updateWordCount() {
      const textarea = document.getElementById('form-description');
      const countEl  = document.getElementById('word-count-display');
      const words    = (textarea.value.trim().match(/\S+/g) || []).length;
      const ok       = words >= 8;
      countEl.textContent = words + (ok ? ' words ✓' : ' words — please add more detail (minimum 8)');
      countEl.className   = 'word-count ' + (ok ? 'sufficient' : 'insufficient');
      updateFormSubmitState();
    }

    /* Enables the submit button only when word count >= 8 AND CCTV checkbox is checked (if applicable) */
    function updateFormSubmitState() {
      const textarea  = document.getElementById('form-description');
      const submitBtn = document.getElementById('form-submit-btn');
      if (!textarea || !submitBtn) return;
      const words  = (textarea.value.trim().match(/\S+/g) || []).length;
      const wordOk = words >= 8;
      let   cctvOk = true;
      if (currentFormType === 'cctv') {
        const cb = document.getElementById('cctv-letter-checkbox');
        cctvOk   = cb && cb.checked;
      }
      submitBtn.disabled = !(wordOk && cctvOk);
    }

    /* Validates and submits the form via submitFormTicket() server-side */
    function submitFormRequest() {
      const textarea    = document.getElementById('form-description');
      const submitBtn   = document.getElementById('form-submit-btn');
      const errorEl     = document.getElementById('form-error');
      const description = textarea ? textarea.value.trim() : '';

      const words = (description.match(/\S+/g) || []).length;
      if (words < 8) {
        errorEl.textContent   = 'Please add more detail to your description (at least 8 words).';
        errorEl.style.display = 'block';
        return;
      }

      let cctvLetterConfirmed = false;
      if (currentFormType === 'cctv') {
        const cb = document.getElementById('cctv-letter-checkbox');
        if (!cb || !cb.checked) {
          errorEl.textContent   = 'You must confirm you have a Director-approved letter before submitting a CCTV request.';
          errorEl.style.display = 'block';
          return;
        }
        cctvLetterConfirmed = true;
      }

      // Show loading state while waiting for server response
      errorEl.style.display = 'none';
      submitBtn.disabled    = true;
      submitBtn.classList.add('loading');
      submitBtn.textContent = '⏳ Submitting…';

      google.script.run
        .withSuccessHandler(onFormSubmitSuccess)
        .withFailureHandler(onFormSubmitError)
        .submitFormTicket({
          description:         description,
          quickStartType:      currentFormType,
          userIdentity:        currentUser,
          sessionId:           sessionId,
          cctvLetterConfirmed: cctvLetterConfirmed,
        });
    }

    /* Called when submitFormTicket() succeeds — hides form, shows success bubble, locks chat */
    function onFormSubmitSuccess(result) {
      if (result && result.error) {
        onFormSubmitError({ message: result.message || 'Something went wrong.' });
        return;
      }

      document.getElementById('form-panel').style.display         = 'none';
      document.getElementById('direct-submit-bar').style.display = 'none';
      currentFormType = null;
      currentChatKey  = null;
      savedChatKey    = null;
      messagesEl.style.display = '';
      // Clear active grid buttons
      document.querySelectorAll('.qs-btn').forEach(function(b) { b.classList.remove('active'); });

      const name    = (result && result.name)           || (currentUser && currentUser.name)           || '—';
      const dept    = (result && result.departmentFull) || (currentUser && (currentUser.departmentFull || currentUser.department)) || '—';
      const sup     = (result && result.supervisor)     || (currentUser && currentUser.supervisor)     || '—';
      const jrfNo   = (result && result.jrfNo)         || '—';
      const rawDesc = (result && result.rawDesc)        || '';

      const successMsg =
        '✅ Your IT Job Request has been submitted!\n\n' +
        '📌 Ticket #' + jrfNo + '\n' +
        '👤 ' + name + '\n' +
        '🏢 ' + dept + '\n' +
        '👨‍💼 Supervisor: ' + sup + '\n' +
        '📝 ' + rawDesc + '\n\n' +
        'Your supervisor will receive an approval email shortly. Once approved, IT staff will be assigned to take action.';

      addMessage(successMsg, 'bot');
      lockChat();
    }

    /* Called when submitFormTicket() throws a hard error — re-enables the form */
    function onFormSubmitError(err) {
      const submitBtn = document.getElementById('form-submit-btn');
      const errorEl   = document.getElementById('form-error');
      if (submitBtn) {
        submitBtn.disabled    = false;
        submitBtn.classList.remove('loading');
        submitBtn.textContent = 'Submit Request →';
      }
      const msg = (err && err.message) ? err.message : 'Something went wrong. Please try again or contact the IT unit directly.';
      if (errorEl) {
        errorEl.textContent   = msg;
        errorEl.style.display = 'block';
      }
    }

    /* Theme toggle — DESIGN.md §7-C */
    function initThemeToggle() {
      var btn  = document.getElementById('theme-toggle');
      var icon = document.getElementById('theme-icon');
      function update() {
        var isLight = document.documentElement.classList.contains('light-mode');
        if (icon) icon.textContent = isLight ? '🌙' : '☀️';
        var label = document.getElementById('theme-label');
        if (label) label.textContent = isLight ? 'Light mode' : 'Dark mode';
      }
      update();
      if (btn) {
        btn.addEventListener('click', function() {
          document.documentElement.classList.toggle('light-mode');
          var isLight = document.documentElement.classList.contains('light-mode');
          localStorage.setItem('pshs_theme', isLight ? 'light' : 'dark');
          update();
        });
      }
    }

    // Start identity resolution immediately on page load
    window.addEventListener('load', function() {
      initThemeToggle();
      initChat();
    });
  </script>
</body>
