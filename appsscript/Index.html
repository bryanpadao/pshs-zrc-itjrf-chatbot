<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Prevent iOS from auto-linking phone numbers, addresses, dates in chat bubbles -->
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no, url=no">
  <title>PSHS ZRC IT Support Chatbot</title>
  <link rel="icon" type="image/png" href="https://drive.google.com/thumbnail?id=14RNRQVTqVzwLduk-In17y7n_SQ6BGUXz&sz=w64">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
      background: #1a3c6e;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100%;
    }

    /* Full-viewport background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background: url('https://drive.google.com/thumbnail?id=1kz4OlKY9jpt_qWtP8aC1BrjLXBhiWcmb&sz=w1920') center/cover no-repeat;
    }

    /* ── Chat container — mobile first ─────────────────────────────────────── */

    /* On mobile: use fixed positioning to guarantee true full-screen coverage
       regardless of any iframe or parent container constraints from Apps Script */
    .chat-container {
      position: fixed;
      inset: 0;
      background: #f2f2f7;   /* iOS system background */
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* On wide screens: float as a centered card */
    @media (min-width: 900px) {
      body {
        align-items: center;
        padding: 24px 0;
      }
      .chat-container {
        position: relative;
        inset: auto;
        width: 560px;
        height: calc(100dvh - 48px);
        border-radius: 14px;
        box-shadow: 0 6px 32px rgba(0,0,0,0.28);
      }
    }

    /* ── Header — messaging app contact style ────────────────────────────── */

    .chat-header {
      background: #fff;
      border-bottom: 1px solid #d1d1d6;
      padding: 10px 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    /* Circular avatar */
    .header-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      overflow: hidden;
      background: #fff;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #f5b800;               /* gold ring */
      box-shadow: 0 0 0 2px #1a3c6e;           /* outer blue ring */
    }

    .header-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .header-name {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: -0.2px;
    }

    .header-status {
      font-size: 11px;
      color: #8e8e93;
    }

    /* ── Messages area ───────────────────────────────────────────────────── */

    .chat-messages {
      flex: 1;
      padding: 12px 12px 8px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
      background: #f2f2f7;
    }

    /* Row wrapper — used for bot messages to place avatar + bubble side by side */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }

    .msg-row.bot-row { align-self: flex-start; max-width: 84%; }

    /* Small circular bot avatar beside each bot bubble */
    .bot-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: #fff;
      border: 1.5px solid #f5b800;             /* gold ring */
      box-shadow: 0 0 0 1.5px #1a3c6e;         /* outer blue ring */
    }

    .bot-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Bubble base */
    .message {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: break-word; /* only break truly unbreakable long strings */
      word-break: normal;        /* do NOT split normal words mid-character */
    }

    /* Bot bubble — white with bottom-left tail */
    .message.bot {
      background: #fff;
      color: #1a1a1a !important;
      border-bottom-left-radius: 4px;
    }

    /* Prevent browser auto-link detection from coloring bot text blue */
    .message.bot a,
    .message.bot * {
      color: #1a1a1a !important;
      text-decoration: none !important;
      pointer-events: none;
    }

    /* User bubble — PSHS blue with bottom-right tail */
    .message.user {
      background: #1a3c6e;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      max-width: 84%;
    }

    /* Prevent browser auto-link detection from coloring user text */
    .message.user a {
      color: #fff;
      text-decoration: none;
      pointer-events: none;
    }

    /* ── Input bar — iMessage style ──────────────────────────────────────── */

    .chat-input {
      display: flex;
      align-items: flex-end;
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: #fff;
      border-top: 1px solid #d1d1d6;
      gap: 8px;
      flex-shrink: 0;
    }

    .chat-input textarea {
      flex: 1;
      resize: none;
      border: 1px solid #d1d1d6;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 16px;    /* 16px prevents iOS auto-zoom on focus */
      font-family: inherit;
      outline: none;
      min-height: 40px;
      max-height: 120px;
      overflow-y: hidden;  /* hidden by default; JS enables scroll only when content exceeds max-height */
      line-height: 1.4;
      background: #f2f2f7;
      color: #1a1a1a;
      transition: border-color 0.15s;
    }

    .chat-input textarea:focus {
      border-color: #1a3c6e;
      background: #fff;
    }

    /* Send button — circle, hides until textarea has content */
    .chat-input button {
      background: #1a3c6e;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
      touch-action: manipulation;
      margin-bottom: 2px; /* align with textarea baseline */
    }

    .chat-input button:hover  { background: #255090; }
    .chat-input button:active { transform: scale(0.92); background: #0f2550; }

    /* Locked state */
    .chat-input.locked textarea {
      background: #f5f5f5;
      color: #aaa;
      cursor: not-allowed;
    }

    .chat-input.locked button {
      background: #c7c7cc;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ── New chat bar ────────────────────────────────────────────────────── */

    .new-chat-bar {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid #d1d1d6;
      background: #fff;
      text-align: center;
      display: none;
      flex-shrink: 0;
    }

    .new-chat-bar button {
      background: #1a3c6e;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 11px 28px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
      touch-action: manipulation;
    }

    .new-chat-bar button:hover { background: #255090; }

    /* ── Typing indicator ────────────────────────────────────────────────── */

    /* Wrap typing in a row so it aligns with bot messages */
    .typing-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      align-self: flex-start;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 14px;
      background: #fff;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 7px; height: 7px;
      background: #8e8e93;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-5px); }
    }

    /* ── Quick-reply option buttons ──────────────────────────────────────── */

    .quick-replies {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 4px 0 4px 32px; /* indent to align under bot bubbles */
      align-self: flex-start;
      width: 100%;
    }

    .quick-reply-btn {
      background: #fff;
      border: 1.5px solid #1a3c6e;
      color: #1a3c6e;
      border-radius: 20px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      text-align: left;
      transition: background 0.15s, color 0.15s;
      touch-action: manipulation;
      width: fit-content;
      max-width: 100%;
    }

    .quick-reply-btn:hover  { background: #1a3c6e; color: #fff; }
    .quick-reply-btn:active { background: #0f2550; color: #fff; }

    /* ── My Tickets button ───────────────────────────────────────────────── */

    .my-tickets-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 4px 16px 0;
      padding: 10px;
      background: transparent;
      border: 1.5px solid #1a3c6e;
      border-radius: 20px;
      color: #1a3c6e;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      font-family: inherit;
      transition: background 0.15s;
    }
    .my-tickets-btn:hover { background: #f0f4fa; }

    /* ── My Tickets panel ────────────────────────────────────────────────── */

    .my-tickets-panel {
      position: absolute;
      inset: 0;
      background: #f2f2f7;
      z-index: 10;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .my-tickets-panel-header {
      background: #1a3c6e;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
      flex-shrink: 0;
    }

    .my-tickets-panel-header button {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.5);
      color: #fff;
      padding: 4px 12px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }

    .my-tickets-list { flex: 1; overflow-y: auto; padding: 12px; }

    .ticket-item {
      background: #fff;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      cursor: pointer;
    }

    .ticket-item:hover { background: #f7f8ff; }
    .ticket-item .ti-jrf { font-size: 11px; color: #888; }
    .ticket-item .ti-problem { font-size: 14px; font-weight: 500; color: #1a1a1a; margin: 2px 0 6px; }
    .ticket-item .ti-status { font-size: 12px; color: #1a3c6e; }

    .ticket-detail {
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .ticket-detail p { font-size: 13px; line-height: 1.6; color: #333; }

    .ticket-detail .back-btn {
      font-size: 12px;
      color: #1a3c6e;
      cursor: pointer;
      text-decoration: underline;
      margin-bottom: 8px;
      display: inline-block;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="chat-container">

    <!-- Header styled like a messaging app contact header -->
    <div class="chat-header">
      <div class="header-avatar">
        <img src="https://drive.google.com/thumbnail?id=14RNRQVTqVzwLduk-In17y7n_SQ6BGUXz&sz=w200" alt="PSHS ZRC Logo">
      </div>
      <div class="header-name">PSHS ZRC IT Support</div>
      <div class="header-status">IT Job Request Form Chatbot</div>
    </div>

    <div class="chat-messages" id="messages"></div>

    <div class="chat-input" id="chat-input">
      <textarea id="input" placeholder="Choose an option above…" rows="1" disabled></textarea>
      <button id="sendBtn">&#9650;</button>
    </div>

    <div class="new-chat-bar" id="new-chat-bar">
      <button onclick="resetChat()">&#8635; Start a New Conversation</button>
    </div>
  </div>

  <script>
    const messagesEl  = document.getElementById('messages');
    const inputEl     = document.getElementById('input');
    const sendBtn     = document.getElementById('sendBtn');
    const chatInputEl = document.getElementById('chat-input');
    const newChatBar  = document.getElementById('new-chat-bar');

    const BOT_AVATAR_URL = 'https://drive.google.com/thumbnail?id=14RNRQVTqVzwLduk-In17y7n_SQ6BGUXz&sz=w200';

    let sessionId   = ''; // server-side session key
    let currentUser = null; // identity from getUserIdentity() — set on load

    function lockChat() {
      chatInputEl.classList.add('locked');
      inputEl.disabled = true;
      inputEl.placeholder = 'Conversation ended.';
      chatInputEl.style.display = 'none';
      newChatBar.style.display = 'block';
    }

    /* Adds a message bubble. Bot messages get a small avatar beside them. */
    function addMessage(text, type) {
      if (type === 'bot') {
        // Row wrapper with avatar + bubble (messaging app style)
        const row = document.createElement('div');
        row.className = 'msg-row bot-row';

        const avatar = document.createElement('div');
        avatar.className = 'bot-avatar';
        avatar.innerHTML = '<img src="' + BOT_AVATAR_URL + '" alt="bot">';

        const bubble = document.createElement('div');
        bubble.className = 'message bot';
        bubble.textContent = text;

        row.appendChild(avatar);
        row.appendChild(bubble);
        messagesEl.appendChild(row);
      } else {
        // User bubbles: no wrapper needed — appended directly so max-width: 84%
        // calculates against the full chat width, not a shrink-to-fit row
        const bubble = document.createElement('div');
        bubble.className = 'message user';
        bubble.textContent = text;
        messagesEl.appendChild(bubble);
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    /* Typing indicator also uses the bot-row layout for visual consistency */
    function showTyping() {
      const row = document.createElement('div');
      row.className = 'typing-row';
      row.id = 'typing-indicator';

      const avatar = document.createElement('div');
      avatar.className = 'bot-avatar';
      avatar.innerHTML = '<img src="' + BOT_AVATAR_URL + '" alt="bot">';

      const dots = document.createElement('div');
      dots.className = 'typing';
      dots.innerHTML = '<span></span><span></span><span></span>';

      row.appendChild(avatar);
      row.appendChild(dots);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      inputEl.value = '';
      inputEl.style.height = 'auto';
      showTyping();

      // Pass userIdentity on every message so server can pre-fill on first use
      const chatParams = { message: text, sessionId: sessionId };
      if (currentUser) chatParams.userIdentity = currentUser;

      google.script.run
        .withSuccessHandler(function(response) {
          hideTyping();
          sessionId = response.sessionId || sessionId;
          if (response.replies && response.replies.length > 1) {
            response.replies.forEach(function(r) { if (r) addMessage(r, 'bot'); });
          } else {
            addMessage(response.reply, 'bot');
          }
          if (response.submitted) lockChat();
        })
        .withFailureHandler(function(err) {
          hideTyping();
          addMessage('Sorry, something went wrong. Please try again.', 'bot');
          console.error(err);
        })
        .processChat(chatParams);
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener('input', function() {
      this.style.height = 'auto';
      const newH = Math.min(this.scrollHeight, 120);
      this.style.height = newH + 'px';
      // Only show scroll when content exceeds max-height
      this.style.overflowY = this.scrollHeight > 120 ? 'auto' : 'hidden';
    });

    const GREETING = 'Hello! I\'m the PSHS ZRC IT Support Chatbot. What can I help you with today?';

    /* Renders the option buttons after the greeting bubble */
    function showQuickReplies() {
      const options = [
        { label: '💻  IT Issue / Repair',      key: 'it_issue'    },
        { label: '🎨  Publication / Design',    key: 'publication' },
        { label: '📷  CCTV Viewing Request',    key: 'cctv'        },
        { label: '🔧  Technical Assistance',    key: 'technical'   },
        { label: '❓  Ask a Question',          key: 'question'    },
      ];

      const container = document.createElement('div');
      container.className = 'quick-replies';
      container.id = 'quick-replies';

      options.forEach(function(opt) {
        const btn = document.createElement('button');
        btn.className = 'quick-reply-btn';
        btn.textContent = opt.label;
        btn.onclick = function() { handleQuickReply(opt.key, opt.label); };
        container.appendChild(btn);
      });

      messagesEl.appendChild(container);

      // My Tickets button — only for verified employees
      if (currentUser && currentUser.name) {
        const myTicketsBtn = document.createElement('button');
        myTicketsBtn.className = 'my-tickets-btn';
        myTicketsBtn.textContent = '📋 My Tickets';
        myTicketsBtn.onclick = openMyTickets;
        messagesEl.appendChild(myTicketsBtn);
      }

      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    /* Called when user taps one of the option buttons */
    function handleQuickReply(key, label) {
      // Remove the buttons and My Tickets button
      const container = document.getElementById('quick-replies');
      if (container) container.remove();
      const myTicketsBtn = document.querySelector('.my-tickets-btn');
      if (myTicketsBtn) myTicketsBtn.remove();

      // Show the user's choice as a bubble
      addMessage(label, 'user');

      // Enable the input for all paths
      inputEl.disabled = false;
      inputEl.placeholder = 'Message';

      if (key === 'it_issue' || key === 'question') {
        if (key === 'it_issue') {
          addMessage('Sure! Please describe the IT issue you\'re experiencing and I\'ll help troubleshoot.', 'bot');
        } else {
          addMessage('Sure! What would you like to know?', 'bot');
        }
      } else {
        // Direct form — skip Gemini entirely, start form collection on the server
        showTyping();
        const quickParams = { message: '', sessionId: sessionId, quickStart: key };
        if (currentUser) quickParams.userIdentity = currentUser;
        google.script.run
          .withSuccessHandler(function(response) {
            hideTyping();
            sessionId = response.sessionId || sessionId;
            if (response.replies && response.replies.length > 1) {
              response.replies.forEach(function(r) { if (r) addMessage(r, 'bot'); });
            } else {
              addMessage(response.reply, 'bot');
            }
          })
          .withFailureHandler(function(err) {
            hideTyping();
            addMessage('Sorry, something went wrong. Please try again.', 'bot');
            console.error(err);
          })
          .processChat(quickParams);
      }
    }

    function resetChat() {
      sessionId = '';
      messagesEl.innerHTML = '';
      chatInputEl.classList.remove('locked');
      inputEl.disabled = true;
      inputEl.placeholder = 'Choose an option above…';
      chatInputEl.style.display = '';
      newChatBar.style.display = 'none';
      // Show personalized greeting if user is known, otherwise generic
      if (currentUser && currentUser.name) {
        const firstName = currentUser.name.split(' ')[0];
        addMessage('Hi, ' + firstName + '! 👋 How can I help you today?', 'bot');
      } else {
        addMessage(GREETING, 'bot');
      }
      showQuickReplies();
    }

    function enableInput() {
      inputEl.disabled = false;
      inputEl.placeholder = 'Message';
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── Identity resolution ────────────────────────────────────────────────

    function initChat() {
      // Show a loading bubble while resolving identity
      const loadingRow = document.createElement('div');
      loadingRow.className = 'msg-row bot-row';
      loadingRow.id = 'identity-loading-row';
      const loadingAvatar = document.createElement('div');
      loadingAvatar.className = 'bot-avatar';
      loadingAvatar.innerHTML = '<img src="' + BOT_AVATAR_URL + '" alt="bot">';
      const loadingBubble = document.createElement('div');
      loadingBubble.className = 'message bot';
      loadingBubble.textContent = 'Loading…';
      loadingRow.appendChild(loadingAvatar);
      loadingRow.appendChild(loadingBubble);
      messagesEl.appendChild(loadingRow);

      google.script.run
        .withSuccessHandler(onIdentityResolved)
        .withFailureHandler(function() { onIdentityResolved({ error: 'not_signed_in' }); })
        .getUserIdentity();
    }

    function onIdentityResolved(identity) {
      // Remove loading bubble
      const loadingRow = document.getElementById('identity-loading-row');
      if (loadingRow) loadingRow.remove();

      if (identity.error === 'not_signed_in') {
        showFullScreenMessage(
          'Please sign in with your PSHS ZRC Google account to use this chatbot.',
          'Sign in with Google',
          function() { location.reload(); }
        );
        return;
      }

      if (identity.error === 'wrong_domain') {
        showFullScreenMessage(
          'This chatbot is only for PSHS ZRC staff. Please sign in with your @' + identity.domain + ' school account.',
          'Sign in with a different account',
          function() { window.open('https://accounts.google.com/signout'); setTimeout(function(){ location.reload(); }, 1000); }
        );
        return;
      }

      if (identity.error === 'not_in_employees') {
        showFullScreenMessage(
          'Access denied. Your account (' + (identity.email || '') + ') is not registered in the PSHS ZRC employee records. ' +
          'Contact the IT unit to have your record added.',
          'Sign in with a different account',
          function() { window.open('https://accounts.google.com/signout'); setTimeout(function(){ location.reload(); }, 1000); }
        );
        return;
      }

      // Success — identity found
      currentUser = identity;
      const firstName = identity.name ? identity.name.split(' ')[0] : 'there';
      addMessage('Hi, ' + firstName + '! 👋 I\'m the PSHS ZRC IT Help Desk assistant. How can I help you today?', 'bot');

      // Enable input immediately so the user can type without waiting or clicking a button
      enableInput();

      // Check for ticket updates before showing quick-start buttons
      google.script.run
        .withSuccessHandler(onTicketUpdatesReceived)
        .withFailureHandler(function() { showQuickReplies(); })
        .getTicketUpdates(identity.email);
    }

    function showFullScreenMessage(message, buttonText, buttonAction) {
      const container = document.querySelector('.chat-container');
      container.innerHTML = '';
      const div = document.createElement('div');
      div.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px;text-align:center;gap:16px;';
      const p = document.createElement('p');
      p.style.cssText = 'font-size:15px;color:#333;line-height:1.5;max-width:320px;';
      p.textContent = message;
      const btn = document.createElement('button');
      btn.textContent = buttonText;
      btn.style.cssText = 'padding:12px 24px;background:#1a3c6e;color:#fff;border:none;border-radius:24px;font-size:15px;cursor:pointer;font-family:inherit;';
      btn.onclick = buttonAction;
      div.appendChild(p);
      div.appendChild(btn);
      container.appendChild(div);
    }

    function onTicketUpdatesReceived(updates) {
      if (updates && updates.length > 0) {
        const cacheKey = 'pshs_ticket_cache_' + (currentUser && currentUser.email ? currentUser.email : '');
        let lastCache = {};
        try { lastCache = JSON.parse(localStorage.getItem(cacheKey) || '{}'); } catch(e) {}

        const changed = updates.filter(function(t) { return lastCache[t.jrfNo] !== t.status; });

        if (changed.length > 0) {
          addMessage('Here\'s an update on your recent IT requests:', 'bot');
          changed.forEach(function(t) {
            let statusLine = '';
            if (t.status === 'Pending IT Assessment') statusLine = '⏳ Waiting for IT staff assessment';
            else if (t.status === 'Pending Director Approval') statusLine = '⏳ Waiting for Campus Director approval';
            else if (t.status === 'In Progress') statusLine = '🔧 Being worked on by ' + (t.assignedStaff || 'IT staff') + (t.targetDate ? ' — target: ' + t.targetDate : '');
            else if (t.status === 'Completed') statusLine = '✅ Resolved on ' + (t.dateCompleted || '—');
            else if (t.status === 'Rejected') statusLine = '❌ Request was not approved';
            else statusLine = t.status;

            const problem = t.problem.length > 60 ? t.problem.substring(0, 60) + '…' : t.problem;
            addMessage('📋 Ticket #' + t.jrfNo + ' — ' + problem + '\n' + statusLine, 'bot');
          });
          addMessage('Let me know if you have a new request or need help.', 'bot');

          // Update cache
          updates.forEach(function(t) { lastCache[t.jrfNo] = t.status; });
          try { localStorage.setItem(cacheKey, JSON.stringify(lastCache)); } catch(e) {}
        }
      }
      showQuickReplies();
    }

    // ── My Tickets panel ────────────────────────────────────────────────────

    function openMyTickets() {
      google.script.run
        .withSuccessHandler(renderMyTicketsPanel)
        .withFailureHandler(function(err) { alert('Could not load tickets: ' + (err && err.message ? err.message : err)); })
        .getMyTickets(currentUser.email);
    }

    function renderMyTicketsPanel(tickets) {
      const container = document.querySelector('.chat-container');
      // Remove existing panel if any
      const existing = document.getElementById('my-tickets-panel');
      if (existing) existing.remove();

      const panel = document.createElement('div');
      panel.className = 'my-tickets-panel';
      panel.id = 'my-tickets-panel';

      const header = document.createElement('div');
      header.className = 'my-tickets-panel-header';
      const headerTitle = document.createElement('span');
      headerTitle.textContent = '📋 My IT Tickets';
      header.appendChild(headerTitle);
      const backBtn = document.createElement('button');
      backBtn.textContent = '← Back to Chat';
      backBtn.onclick = function() { panel.remove(); };
      header.appendChild(backBtn);
      panel.appendChild(header);

      const list = document.createElement('div');
      list.className = 'my-tickets-list';
      list.id = 'my-tickets-list';

      if (!tickets || tickets.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:#888;padding:32px;font-size:14px;">No tickets found.</p>';
      } else {
        tickets.forEach(function(t) {
          const item = document.createElement('div');
          item.className = 'ticket-item';
          const problem = t.problem.length > 60 ? t.problem.substring(0, 60) + '…' : t.problem;
          item.innerHTML =
            '<div class="ti-jrf">JRF #' + escHtml(t.jrfNo) + ' &nbsp;·&nbsp; ' + escHtml(t.date) + '</div>' +
            '<div class="ti-problem">' + escHtml(problem) + '</div>' +
            '<div class="ti-status">' + escHtml(t.status) + '</div>';
          item.onclick = function() { showTicketDetail(list, t, tickets); };
          list.appendChild(item);
        });
      }

      panel.appendChild(list);
      container.appendChild(panel);
    }

    function showTicketDetail(list, t, allTickets) {
      list.innerHTML = '';
      const detail = document.createElement('div');
      detail.className = 'ticket-detail';

      const backBtn = document.createElement('button');
      backBtn.className = 'back-btn';
      backBtn.textContent = '← Back to list';
      backBtn.onclick = function() { renderMyTicketsPanel(allTickets); };
      detail.appendChild(backBtn);

      const fields = [
        ['JRF #:', t.jrfNo],
        ['Date:', t.date],
        ['Status:', t.status],
        ['Problem:', t.problem],
      ];
      if (t.assignedStaff) fields.push(['Assigned to:', t.assignedStaff]);
      if (t.targetDate)    fields.push(['Target date:', t.targetDate]);
      if (t.dateCompleted) fields.push(['Completed:', t.dateCompleted]);

      fields.forEach(function(f) {
        const p = document.createElement('p');
        p.innerHTML = '<strong>' + escHtml(f[0]) + '</strong> ' + escHtml(f[1]);
        detail.appendChild(p);
      });

      list.appendChild(detail);
    }

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Greeting + option buttons on load — replaced by identity-aware initChat()
    window.addEventListener('load', function() {
      initChat();
    });
  </script>
</body>
</html>
